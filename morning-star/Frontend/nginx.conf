server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Django admin — проксі до бекенду
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /static/ {
        alias /static/;  # ← роздаємо напряму з volume
    }

    # React router — всі маршрути на index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксі до Django API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Проксі до WebSocket
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Медіа файли
    location /media/ {
        proxy_pass http://backend:8000;
    }
}